<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C81" />
  <title>Logimatiq SAV — Diagnostic terrain</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
</head>
<body>
  <div id="phone" class="relative">

    <!-- ========== SPLASH ========== -->
    <section id="screen-splash" class="screen bg-gradient-to-b from-brand-600 to-brand-900 text-white">
      <div class="flex-1 flex flex-col items-center justify-center px-8 text-center">
        <div class="w-20 h-20 rounded-2xl bg-white/10 backdrop-blur flex items-center justify-center mb-6 ring-1 ring-white/20">
          <svg viewBox="0 0 24 24" class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.5 2A9.5 9.5 0 1 1 3 12a9.5 9.5 0 0 1 17.5 0z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight">Logimatiq SAV</h1>
        <p class="mt-2 text-brand-100 text-sm">Diagnostic terrain — guide pas à pas</p>
        <button data-nav="home"
          class="mt-12 w-full max-w-xs btn-primary bg-accent-500 hover:bg-accent-600 active:bg-accent-600 text-white font-semibold py-4 rounded-2xl shadow-lg shadow-amber-900/20">
          Démarrer
        </button>
        <p class="mt-6 text-xs text-brand-100/70">v0.1 · maquette interne</p>
      </div>
    </section>

    <!-- ========== HOME ========== -->
    <section id="screen-home" class="screen">
      <header class="px-5 pt-6 pb-3 bg-white">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider text-slate-500">Bonjour</p>
            <h2 class="text-xl font-bold text-slate-900">Quelle machine ?</h2>
          </div>
          <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center" aria-label="profil">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 14a4 4 0 1 0-8 0M12 7a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
          </button>
        </div>
      </header>
      <div class="scroll-area flex-1 px-5 pt-2 pb-28">
        <button data-nav="kb"
          class="w-full mt-2 flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3 text-left text-slate-500">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/>
          </svg>
          <span class="text-sm">Chercher un symptôme, une fiche…</span>
        </button>
        <h3 class="mt-6 mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">Démarrer un diagnostic</h3>
        <div class="grid grid-cols-2 gap-3" id="machine-grid"></div>
        <h3 class="mt-7 mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">Reprendre</h3>
        <div id="recent-list" class="space-y-2"></div>
      </div>
      <!-- Bottom nav -->
      <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 pt-2 pb-3 flex justify-around">
        <button data-nav="home" class="flex flex-col items-center gap-0.5 px-4 py-1 text-brand-600">
          <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m3 11 9-8 9 8M5 10v10h14V10"/>
          </svg>
          <span class="text-[10px] font-medium">Diagnostic</span>
        </button>
        <button data-nav="kb" class="flex flex-col items-center gap-0.5 px-4 py-1 text-slate-400">
          <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V5z"/>
          </svg>
          <span class="text-[10px] font-medium">Connaissances</span>
        </button>
        <button data-nav="history" class="flex flex-col items-center gap-0.5 px-4 py-1 text-slate-400">
          <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 7v5l3 2"/>
          </svg>
          <span class="text-[10px] font-medium">Historique</span>
        </button>
      </nav>
    </section>

    <!-- ========== SYMPTOMES ========== -->
    <section id="screen-symptoms" class="screen">
      <header class="bg-white px-4 pt-5 pb-4 border-b border-slate-200">
        <div class="flex items-center gap-2">
          <button data-nav="home" class="w-9 h-9 rounded-full -ml-1 flex items-center justify-center hover:bg-slate-100">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <div>
            <p class="text-xs text-slate-500" id="sym-machine-label">EPIMAT</p>
            <h2 class="text-lg font-bold text-slate-900">Quel est le problème ?</h2>
          </div>
        </div>
      </header>
      <div class="scroll-area flex-1 px-4 py-4 space-y-2" id="symptoms-list"></div>
    </section>

    <!-- ========== DIAGNOSTIC ========== -->
    <section id="screen-diag" class="screen">
      <header class="bg-white px-4 pt-5 pb-3 border-b border-slate-200">
        <div class="flex items-center justify-between">
          <button id="btn-diag-back" class="w-9 h-9 rounded-full -ml-1 flex items-center justify-center hover:bg-slate-100">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <div class="text-xs font-medium text-slate-500" id="diag-step-label">Étape 1</div>
          <button id="btn-diag-quit" class="text-xs text-slate-500 hover:text-slate-800 px-2 py-1">Quitter</button>
        </div>
        <div class="mt-3 flex gap-1" id="progress-bar"></div>
      </header>
      <div class="scroll-area flex-1 px-5 pt-5 pb-6" id="diag-body"></div>
    </section>

    <!-- ========== BASE DE CONNAISSANCES ========== -->
    <section id="screen-kb" class="screen">
      <header class="bg-white px-4 pt-5 pb-4 border-b border-slate-200">
        <div class="flex items-center gap-2">
          <button data-nav="home" class="w-9 h-9 rounded-full -ml-1 flex items-center justify-center hover:bg-slate-100">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <h2 class="text-lg font-bold text-slate-900">Base de connaissances</h2>
        </div>
        <div class="mt-3 flex items-center gap-2 bg-slate-100 rounded-2xl px-3 py-2.5">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/>
          </svg>
          <input id="kb-search" placeholder="écran noir, modem, badge…" class="bg-transparent outline-none text-sm flex-1" />
        </div>
      </header>
      <div class="scroll-area flex-1 px-4 py-4 space-y-3" id="kb-list"></div>
    </section>

    <!-- ========== HISTORIQUE ========== -->
    <section id="screen-history" class="screen">
      <header class="bg-white px-4 pt-5 pb-4 border-b border-slate-200 flex items-center gap-2">
        <button data-nav="home" class="w-9 h-9 rounded-full -ml-1 flex items-center justify-center hover:bg-slate-100">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <h2 class="text-lg font-bold text-slate-900">Historique</h2>
      </header>
      <div class="scroll-area flex-1 px-4 py-4" id="history-list"></div>
    </section>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
