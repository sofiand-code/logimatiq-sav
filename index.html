<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C81" />
  <title>Logimatiq SAV — Diagnostic terrain</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
</head>
<body>
  <div id="phone" class="relative">

    <!-- ========== SPLASH ========== -->
    <section id="screen-splash" class="screen bg-brand-600 text-white">
      <!-- Cercles décoratifs -->
      <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full bg-white/5"></div>
        <div class="absolute top-1/3 -left-16 w-48 h-48 rounded-full bg-white/5"></div>
        <div class="absolute -bottom-16 -right-8 w-64 h-64 rounded-full bg-brand-700/60"></div>
      </div>

      <div class="relative flex-1 flex flex-col px-8 pt-20 pb-10">
        <!-- Logo -->
        <div class="flex-1 flex flex-col items-center justify-center text-center">
          <div class="w-24 h-24 rounded-3xl bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center mb-8 shadow-2xl">
            <svg viewBox="0 0 24 24" class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.5 2A9.5 9.5 0 1 1 3 12a9.5 9.5 0 0 1 17.5 0z"/>
            </svg>
          </div>
          <h1 class="text-4xl font-black tracking-tight">Logimatiq</h1>
          <p class="text-xl font-semibold text-white/70 mt-1">SAV Terrain</p>
          <p class="mt-4 text-sm text-white/50 leading-relaxed max-w-xs">
            Guide de diagnostic pas à pas pour techniciens et clients
          </p>
        </div>

        <!-- CTA -->
        <div class="space-y-3">
          <button data-nav="home"
            class="w-full bg-white text-brand-700 font-bold py-4 rounded-2xl text-base shadow-xl active:scale-98 transition-transform">
            Démarrer un diagnostic
          </button>
          <p class="text-center text-xs text-white/30">v0.1 · usage interne</p>
        </div>
      </div>
    </section>

    <!-- ========== HOME ========== -->
    <section id="screen-home" class="screen bg-slate-50">
      <!-- Header -->
      <header class="px-5 pt-10 pb-4 bg-white border-b border-slate-100">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-brand-500">Logimatiq SAV</p>
            <h2 class="text-2xl font-black text-slate-900 mt-0.5">Quelle machine ?</h2>
          </div>
          <button class="w-11 h-11 rounded-2xl bg-slate-100 flex items-center justify-center" aria-label="profil">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 14a4 4 0 1 0-8 0M12 7a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="scroll-area flex-1 px-4 pt-4 pb-28">
        <!-- Barre de recherche -->
        <button data-nav="kb"
          class="w-full flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-4 py-3.5 text-left shadow-sm">
          <div class="w-8 h-8 rounded-xl bg-brand-50 flex items-center justify-center">
            <svg viewBox="0 0 24 24" class="w-4 h-4 text-brand-600" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/>
            </svg>
          </div>
          <span class="text-sm text-slate-400 font-medium">Chercher un symptôme, une fiche…</span>
        </button>

        <!-- Grille machines -->
        <h3 class="mt-6 mb-3 text-xs font-bold uppercase tracking-widest text-slate-400">Démarrer un diagnostic</h3>
        <div class="grid grid-cols-2 gap-3" id="machine-grid"></div>

        <!-- Récents -->
        <h3 class="mt-7 mb-3 text-xs font-bold uppercase tracking-widest text-slate-400">Récents</h3>
        <div id="recent-list" class="space-y-2"></div>
      </div>

      <!-- Bottom nav -->
      <nav class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-200/60 px-2 pt-2 pb-5 flex justify-around">
        <button data-nav="home" class="flex flex-col items-center gap-1 px-5 py-1.5 rounded-xl text-brand-600">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span class="text-[10px] font-bold">Accueil</span>
        </button>
        <button data-nav="kb" class="flex flex-col items-center gap-1 px-5 py-1.5 rounded-xl text-slate-400">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V5z"/>
          </svg>
          <span class="text-[10px] font-semibold">Fiches</span>
        </button>
        <button data-nav="history" class="flex flex-col items-center gap-1 px-5 py-1.5 rounded-xl text-slate-400">
          <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 7v5l3 2"/>
          </svg>
          <span class="text-[10px] font-semibold">Historique</span>
        </button>
      </nav>
    </section>

    <!-- ========== SYMPTOMES ========== -->
    <section id="screen-symptoms" class="screen bg-slate-50">
      <header class="bg-white px-4 pt-10 pb-4 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <button data-nav="home" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center active:bg-slate-200">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <div>
            <p class="text-xs font-bold uppercase tracking-widest text-brand-500" id="sym-machine-label">EPIMAT</p>
            <h2 class="text-xl font-black text-slate-900">Quel est le problème ?</h2>
          </div>
        </div>
      </header>
      <div class="scroll-area flex-1 px-4 py-4 space-y-2.5" id="symptoms-list"></div>
    </section>

    <!-- ========== DIAGNOSTIC ========== -->
    <section id="screen-diag" class="screen bg-slate-50">
      <header class="bg-white px-4 pt-10 pb-3 border-b border-slate-100">
        <div class="flex items-center justify-between">
          <button id="btn-diag-back" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center active:bg-slate-200">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <div class="flex items-center gap-2">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider" id="diag-step-label">Étape 1</div>
          </div>
          <button id="btn-diag-quit" class="text-xs font-semibold text-slate-400 hover:text-rose-500 transition-colors px-2 py-1">Quitter</button>
        </div>
        <div class="mt-3 flex gap-1" id="progress-bar"></div>
      </header>
      <div class="scroll-area flex-1 px-5 pt-5 pb-8" id="diag-body"></div>
    </section>

    <!-- ========== BASE DE CONNAISSANCES ========== -->
    <section id="screen-kb" class="screen bg-slate-50">
      <header class="bg-white px-4 pt-10 pb-4 border-b border-slate-100">
        <div class="flex items-center gap-3 mb-3">
          <button data-nav="home" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <h2 class="text-xl font-black text-slate-900">Base de connaissances</h2>
        </div>
        <div class="flex items-center gap-2 bg-slate-100 rounded-2xl px-4 py-3">
          <svg viewBox="0 0 24 24" class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.5-3.5"/>
          </svg>
          <input id="kb-search" placeholder="écran noir, modem, badge…"
            class="bg-transparent outline-none text-sm flex-1 text-slate-700 placeholder:text-slate-400" />
        </div>
      </header>
      <div class="scroll-area flex-1 px-4 py-4 space-y-2.5" id="kb-list"></div>
    </section>

    <!-- ========== HISTORIQUE ========== -->
    <section id="screen-history" class="screen bg-slate-50">
      <header class="bg-white px-4 pt-10 pb-4 border-b border-slate-100 flex items-center gap-3">
        <button data-nav="home" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <h2 class="text-xl font-black text-slate-900">Historique</h2>
      </header>
      <div class="scroll-area flex-1 px-4 py-4" id="history-list"></div>
    </section>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
